spring.application.name=ChickenWiki

# =========================
# Supabase Postgres (Session pooler, IPv4)
# =========================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.njfoeybppzpjxsihpbib
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA
# =========================
# Do not create or update tables automatically on startup.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# =========================
# Logging
# =========================
logging.charset.console=UTF-8

# =========================
# Local links
# =========================
app.local-host=localhost
app.frontend.url=

# =========================
# Auth
# =========================
app.auth.jwt-secret=${JWT_SECRET:local-dev-secret-change-me}
app.auth.token-valid-hours=${JWT_TOKEN_VALID_HOURS:12}

# =========================
# Crawling
# =========================
app.crawling.minimum-interval-days=0
app.crawling.request-delay-ms=120
app.crawling.admin-token=${CRAWL_ADMIN_TOKEN:}
